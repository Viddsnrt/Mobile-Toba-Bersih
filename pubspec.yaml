name: toba_bersih
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  http: ^1.6.0
  socket_io_client: ^3.1.4
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# Konfigurasi launcher icons harus rata kiri
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/toba.png"
  min_sdk_android: 21

# Bagian khusus aset Flutter
flutter:
  uses-material-design: true

  # assets harus menjorok 2 spasi dari kata flutter
  assets:
    - assets/images/splash1.jpg
    - assets/images/splash2.jpg
    - assets/images/splash3.jpg